name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Dev
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Dev/pyproject.toml
      - name: Install package with dev extras
        run: pip install -e .[dev]
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  typecheck:
    name: Typecheck (mypy --strict)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Dev
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Dev/pyproject.toml
      - name: Install package with dev extras
        run: pip install -e .[dev]
      - name: mypy --strict
        run: mypy --strict src/precept

  security:
    name: Security (bandit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Dev
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Dev/pyproject.toml
      - name: Install package with dev extras
        run: pip install -e .[dev]
      - name: bandit
        run: bandit -r src/precept -ll

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: Dev
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: Dev/pyproject.toml
      - name: Install package with dev extras
        run: pip install -e .[dev]
      - name: pytest with coverage
        run: pytest --cov=src/precept --cov-report=xml --cov-report=term-missing
      - name: Upload coverage artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: Dev/coverage.xml
          if-no-files-found: warn
          retention-days: 14
