# Repo-wide pre-commit hooks.
# - File-hygiene + ruff run on every commit.
# - mypy --strict runs on pre-push only, to keep the commit loop fast.
# The package lives in Dev/, so ruff is pointed at Dev/pyproject.toml for config discovery.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--config, Dev/pyproject.toml, --fix]
      - id: ruff-format
        args: [--config, Dev/pyproject.toml]

  - repo: local
    hooks:
      - id: mypy-precept
        name: mypy --strict (src/precept)
        entry: bash -c 'cd Dev && mypy --strict src/precept'
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
